name: Framework CI Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  JAVA_VERSION: "17"

jobs:
  test-and-publish-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Test and Publish CDC Artifacts
        run: ./gradlew --no-daemon clean test publish --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CDC_GITHUB_PACKAGES_URL: https://maven.pkg.github.com/${{ github.repository }}

  build-and-push-framework-image:
    runs-on: ubuntu-latest
    needs: test-and-publish-artifacts
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and Push Framework Image
        run: |
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub credentials not set. Skipping image build/push."
            exit 0
          fi
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker buildx create --use --name cdc-builder || true
          docker buildx build \
            --push \
            -t "${DOCKERHUB_USERNAME}/consumer-driven-contract-testing:${GITHUB_SHA}" \
            -t "${DOCKERHUB_USERNAME}/consumer-driven-contract-testing:latest" \
            .
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-framework-job-to-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push-framework-image
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ] || [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Kubernetes config or Docker Hub username not set. Skipping kubeconfig setup."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Run Framework Job in Kubernetes
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ] || [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Kubernetes config or Docker Hub username not set. Skipping deployment."
            exit 0
          fi
          sed "s|__IMAGE__|${DOCKERHUB_USERNAME}/consumer-driven-contract-testing:${GITHUB_SHA}|g" k8s/cdc-framework-job.yaml | kubectl apply -f -
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
